version: '3.8'

services:
  # Spring Boot Application
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: food-score-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL_NAME=qwen3:1.7b
    networks:
      - food-ml-network

networks:
  food-ml-network:
    driver: bridge
