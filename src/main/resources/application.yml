# Food Score MLOps Pipeline Configuration
server:
  port: 8080
  servlet:
    context-path: /food-ml

spring:
  application:
    name: food-score-mlops
  
  # Prevent external Logback configurations from interfering
  main:
    banner-mode: off

  # Enable Virtual Threads (JDK 21)
  threads:
    virtual:
      enabled: true

  # Database Configuration
  datasource:
    url: jdbc:h2:mem:fooddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true

  h2:
    console:
      enabled: true
      path: /h2-console
  
  # Web Resources Configuration for PWA
  web:
    resources:
      static-locations: classpath:/META-INF/resources/
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Cache Configuration
  cache:
    type: simple
    cache-names:
      - product-search
      - product-barcode
      - food-predictions
      - model-versions
      - feature-store
      - training-pipelines
      - ml-predictions
      - feature-cache
      - model-cache
      - product-details
      - nutrition-data
      - ingredient-analysis

# Security Configuration
security:
  basic:
    enabled: true
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

# Ollama Configuration
ollama:
  base-url: http://localhost:11434
  model-name: qwen3:1.7b
  timeout: 60s

# Management and Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  simple:
    metrics:
      export:
        enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.university.foodml: INFO
    org.springframework: WARN
    org.hibernate.SQL: DEBUG
    ch.qos.logback: WARN
    pl.coderion: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 1GB
  logback:
    rollingpolicy:
      file-name-pattern: logs/application-%d{yyyy-MM-dd}.%i.log
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 1GB
  config: classpath:logback-spring.xml





  # Performance Configuration
performance:
  thread-pools:
    ml:
      core-size: 5
      max-size: 20
      queue-capacity: 100
    prediction:
      core-size: 10
      max-size: 50
      queue-capacity: 200
    data-processing:
      core-size: 3
      max-size: 15
      queue-capacity: 50

# Vaadin Configuration
vaadin:
  productionMode: false
  frontend:
    theme: food-score-mlops
    # Frontend source directory
    sourceDirectory: frontend
  pwa:
    enabled: true
    manifest-path: /manifest.json
    service-worker-path: /sw.js
